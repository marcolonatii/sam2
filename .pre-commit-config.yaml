default_stages: [pre-commit]
default_install_hook_types: [pre-commit, pre-push]
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: 'v0.11.2'
    hooks:
      - id: ruff
        args: ['--fix', '--config', 'pyproject.toml']
        exclude: |
          (?x)^(
            src/carbonsix_lcm/.*|
            src/drake/.*|
            thridparty/.*|
            tests/.*|
            demo/.*|
            notebooks/.*|
            sam2_config/.*|
            sav_dataset/.*|
          )$
      - id: ruff-format
        exclude: |
          (?x)^(
            src/carbonsix_lcm/.*|
            src/drake/.*|
            thridparty/.*|
            tests/.*|
            demo/.*|
            notebooks/.*|
            sam2_config/.*|
            sav_dataset/.*|
          )$

